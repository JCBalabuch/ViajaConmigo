<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para que viajes conmigo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & Variables ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0e0c0a;
      --surface:    #181411;
      --surface-2:  #211e1a;
      --gold:       #c9a84c;
      --gold-light: #e2c678;
      --text:       #f0ebe3;
      --muted:      #8a7e72;
      --border:     rgba(201,168,76,.18);
      --radius:     6px;
      --header-h:   70px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Grain overlay ──────────────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: .03;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    header {
      position: sticky; top: 0; z-index: 100;
      height: var(--header-h);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px;
      background: rgba(14,12,10,.85);
      backdrop-filter: blur(18px) saturate(1.4);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.55rem;
      font-weight: 400;
      letter-spacing: .04em;
      color: var(--text);
      user-select: none;
    }

    .logo em {
      font-style: italic;
      color: var(--gold);
    }

    /* ── Select wrapper ─────────────────────────────────────────────── */
    .select-wrap {
      position: relative;
    }

    .select-wrap::after {
      content: '↓';
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      color: var(--gold);
      font-size: .75rem;
      pointer-events: none;
      transition: transform .3s;
    }

    select {
      appearance: none;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: .82rem;
      font-weight: 400;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 10px 38px 10px 16px;
      cursor: pointer;
      min-width: 180px;
      outline: none;
      transition: border-color .25s, background .25s;
    }

    select:hover, select:focus {
      border-color: var(--gold);
      background: var(--surface);
    }

    select option {
      background: var(--surface);
      color: var(--text);
    }

    /* ── Main ───────────────────────────────────────────────────────── */
    main {
      position: relative; z-index: 1;
      padding: 50px 40px 80px;
      min-height: calc(100vh - var(--header-h));
    }

    /* ── Section title ──────────────────────────────────────────────── */
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3rem;
      font-weight: 300;
      font-style: italic;
      color: var(--text);
      margin-bottom: 8px;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp .6s ease forwards;
    }

    .section-line {
      width: 48px; height: 1px;
      background: var(--gold);
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeUp .6s ease .1s forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Masonry grid ───────────────────────────────────────────────── */
    .gallery {
      columns: 4 240px;
      column-gap: 14px;
    }

    .photo-card {
      break-inside: avoid;
      margin-bottom: 14px;
      border-radius: var(--radius);
      overflow: hidden;
      cursor: zoom-in;
      position: relative;
      background: var(--surface);
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp .5s ease forwards;
    }

    .photo-card img {
      display: block;
      width: 100%;
      height: auto;
      transition: transform .45s ease, filter .45s ease;
      filter: brightness(.92) saturate(.9);
    }

    .photo-card:hover img {
      transform: scale(1.04);
      filter: brightness(1) saturate(1.1);
    }

    .photo-card .overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.5) 0%, transparent 50%);
      opacity: 0;
      transition: opacity .35s;
      display: flex; align-items: flex-end; padding: 14px;
    }

    .photo-card:hover .overlay { opacity: 1; }

    .overlay-icon {
      width: 32px; height: 32px;
      border: 1px solid rgba(255,255,255,.6);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: .75rem;
      backdrop-filter: blur(4px);
    }

    /* ── States ─────────────────────────────────────────────────────── */
    .state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px;
      min-height: 400px;
      text-align: center;
    }

    .state-icon {
      font-size: 3rem;
      opacity: .3;
    }

    .state-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 300;
      color: var(--muted);
    }

    .state-sub {
      font-size: .82rem;
      color: var(--muted);
      letter-spacing: .05em;
      opacity: .7;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Modal ──────────────────────────────────────────────────────── */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(8,7,6,.92);
      backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
    }

    .modal-backdrop.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal-content {
      position: relative;
      max-width: 90vw; max-height: 90vh;
      transform: scale(.95);
      transition: transform .35s cubic-bezier(.16,1,.3,1);
    }

    .modal-backdrop.open .modal-content {
      transform: scale(1);
    }

    .modal-content img {
      display: block;
      max-width: 90vw;
      max-height: 85vh;
      width: auto; height: auto;
      border-radius: var(--radius);
      box-shadow: 0 40px 120px rgba(0,0,0,.7);
      object-fit: contain;
    }

    .modal-bar {
      position: absolute; bottom: -48px; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px;
    }

    .modal-filename {
      font-size: .75rem;
      color: var(--muted);
      letter-spacing: .06em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn-download {
      display: flex; align-items: center; gap: 7px;
      background: var(--gold);
      color: #0e0c0a;
      font-family: 'DM Sans', sans-serif;
      font-size: .75rem;
      font-weight: 500;
      letter-spacing: .07em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 9px 18px;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      white-space: nowrap;
      transition: background .2s, transform .15s;
      flex-shrink: 0;
    }

    .btn-download:hover {
      background: var(--gold-light);
      transform: translateY(-1px);
    }

    .btn-close {
      position: absolute; top: -46px; right: 0;
      background: none; border: none;
      color: var(--muted); font-size: 1.5rem;
      cursor: pointer; padding: 4px 10px;
      transition: color .2s;
      line-height: 1;
    }

    .btn-close:hover { color: var(--text); }

    /* ── Navigation arrows ──────────────────────────────────────────── */
    .modal-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(14,12,10,.7);
      border: 1px solid var(--border);
      color: var(--text);
      width: 44px; height: 44px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1.1rem;
      transition: background .2s, border-color .2s;
      backdrop-filter: blur(8px);
      flex-shrink: 0;
    }

    .modal-nav:hover { background: var(--surface-2); border-color: var(--gold); }
    .modal-nav.prev { left: -62px; }
    .modal-nav.next { right: -62px; }

    /* ── Responsive ─────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      header { padding: 0 20px; }
      .logo { font-size: 1.2rem; }
      main { padding: 30px 20px 60px; }
      .section-title { font-size: 2rem; }
      .gallery { columns: 2 140px; column-gap: 8px; }
      .gallery .photo-card { margin-bottom: 8px; }
      .modal-nav { display: none; }
      .modal-bar { bottom: -52px; }
    }
  </style>
</head>

<body>

  <!-- ── Header ── -->
  <header>
    <div class="logo">Para que <em>viajes conmigo</em></div>
    <div class="select-wrap">
      <select id="folder-select">
        <option value="">Cargando destinos…</option>
      </select>
    </div>
  </header>

  <!-- ── Main ── -->
  <main id="main-content">
    <div class="state" id="initial-state">
      <div class="state-icon">✈︎</div>
      <div class="state-text">Elige un destino</div>
      <div class="state-sub">Selecciona una carpeta para ver las fotos</div>
    </div>
  </main>

  <!-- ── Modal ── -->
  <div class="modal-backdrop" id="modal" role="dialog" aria-modal="true">
    <div class="modal-content" id="modal-content">
      <button class="btn-close" id="modal-close" aria-label="Cerrar">✕</button>
      <button class="modal-nav prev" id="modal-prev" aria-label="Anterior">‹</button>
      <img id="modal-img" src="" alt="Foto ampliada" />
      <button class="modal-nav next" id="modal-next" aria-label="Siguiente">›</button>
      <div class="modal-bar">
        <span class="modal-filename" id="modal-filename"></span>
        <a class="btn-download" id="modal-download" download>
          <span>↓</span> Descargar
        </a>
      </div>
    </div>
  </div>

  <script>
    // ── Estado ────────────────────────────────────────────────────────
    let currentPhotos = [];
    let currentIndex  = 0;

    // ── Elementos ────────────────────────────────────────────────────
    const select    = document.getElementById('folder-select');
    const mainEl    = document.getElementById('main-content');
    const modal     = document.getElementById('modal');
    const modalImg  = document.getElementById('modal-img');
    const modalDl   = document.getElementById('modal-download');
    const modalName = document.getElementById('modal-filename');

    // ── Cargar carpetas ───────────────────────────────────────────────
    async function loadFolders() {
      try {
        const res     = await fetch('/api/folders');
        const folders = await res.json();

        if (!folders.length) {
          select.innerHTML = '<option value="">Sin carpetas disponibles</option>';
          return;
        }

        select.innerHTML = '<option value="">— Selecciona un destino —</option>' +
          folders.map(f =>
            `<option value="${encodeURIComponent(f.name)}">${f.name}</option>`
          ).join('');
      } catch (err) {
        select.innerHTML = '<option value="">Error al cargar</option>';
        console.error(err);
      }
    }

    // ── Renderizar galería ────────────────────────────────────────────
    function renderGallery(photos, folderName) {
      currentPhotos = photos;

      mainEl.innerHTML = `
        <h2 class="section-title">${decodeURIComponent(folderName)}</h2>
        <div class="section-line"></div>
        <div class="gallery" id="gallery"></div>
      `;

      const gallery = document.getElementById('gallery');

      photos.forEach((photo, i) => {
        const card = document.createElement('div');
        card.className = 'photo-card';
        card.style.animationDelay = `${Math.min(i * 60, 600)}ms`;
        card.innerHTML = `
          <img
            src="${photo.url}"
            alt="Foto ${i + 1} de ${decodeURIComponent(folderName)}"
            loading="lazy"
          />
          <div class="overlay">
            <div class="overlay-icon">⊕</div>
          </div>
        `;
        card.addEventListener('click', () => openModal(i));
        gallery.appendChild(card);
      });
    }

    // ── Cargar fotos de una carpeta ───────────────────────────────────
    async function loadPhotos(folder) {
      mainEl.innerHTML = `
        <div class="state">
          <div class="spinner"></div>
          <div class="state-sub">Cargando fotos…</div>
        </div>
      `;

      try {
        const res    = await fetch(`/api/photos/${folder}`);
        const photos = await res.json();

        if (!photos.length) {
          mainEl.innerHTML = `
            <div class="state">
              <div class="state-icon">📭</div>
              <div class="state-text">Sin fotos aquí</div>
              <div class="state-sub">Esta carpeta está vacía</div>
            </div>
          `;
          return;
        }

        renderGallery(photos, folder);
      } catch (err) {
        mainEl.innerHTML = `
          <div class="state">
            <div class="state-icon">!</div>
            <div class="state-text">Error al cargar</div>
            <div class="state-sub">${err.message}</div>
          </div>
        `;
      }
    }

    // ── Modal ─────────────────────────────────────────────────────────
    function openModal(index) {
      currentIndex = index;
      updateModal();
      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      modal.classList.remove('open');
      document.body.style.overflow = '';
    }

    function updateModal() {
      const photo      = currentPhotos[currentIndex];
      const filename   = photo.public_id.split('/').pop();
      modalImg.src     = photo.url;
      modalImg.alt     = filename;
      modalName.textContent = filename;

      // URL de descarga con fl_attachment de Cloudinary
      const dlUrl = photo.url.replace('/upload/', '/upload/fl_attachment/');
      modalDl.href     = dlUrl;
      modalDl.download = `${filename}.${photo.format}`;

      document.getElementById('modal-prev').style.opacity = currentIndex === 0 ? '0.3' : '1';
      document.getElementById('modal-next').style.opacity = currentIndex === currentPhotos.length - 1 ? '0.3' : '1';
    }

    document.getElementById('modal-close').addEventListener('click', closeModal);

    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeModal();
    });

    document.getElementById('modal-prev').addEventListener('click', () => {
      if (currentIndex > 0) { currentIndex--; updateModal(); }
    });

    document.getElementById('modal-next').addEventListener('click', () => {
      if (currentIndex < currentPhotos.length - 1) { currentIndex++; updateModal(); }
    });

    document.addEventListener('keydown', (e) => {
      if (!modal.classList.contains('open')) return;
      if (e.key === 'Escape')      closeModal();
      if (e.key === 'ArrowLeft')   { if (currentIndex > 0) { currentIndex--; updateModal(); } }
      if (e.key === 'ArrowRight')  { if (currentIndex < currentPhotos.length - 1) { currentIndex++; updateModal(); } }
    });

    // ── Select change ─────────────────────────────────────────────────
    select.addEventListener('change', () => {
      if (!select.value) {
        mainEl.innerHTML = `
          <div class="state" id="initial-state">
            <div class="state-icon">✈︎</div>
            <div class="state-text">Elige un destino</div>
            <div class="state-sub">Selecciona una carpeta para ver las fotos</div>
          </div>
        `;
        return;
      }
      loadPhotos(select.value);
    });

    // ── Init ──────────────────────────────────────────────────────────
    loadFolders();
  </script>
</body>
</html>
